<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطأ 404 - مسار مفقود | المثلث الأحمر</title>
    <link rel="icon" type="image/png" href="pics/icon.png">
    <link rel="stylesheet" href="css/style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        .error-page {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        .error-code {
            font-size: 150px;
            font-weight: 800;
            color: #ff0000;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.6);
            margin-bottom: 10px;
            font-family: monospace;
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0% {
                transform: translate(0)
            }

            20% {
                transform: translate(-5px, 5px)
            }

            40% {
                transform: translate(-5px, -5px)
            }

            60% {
                transform: translate(5px, 5px)
            }

            80% {
                transform: translate(5px, -5px)
            }

            100% {
                transform: translate(0)
            }
        }
    </style>
</head>

<body class="error-page">
    <div style="z-index: 10;">
        <h1 class="error-code">404</h1>
        <h2 style="color: #d4af37; margin-bottom: 20px; font-size: 30px;">SYSTEM BREACH / FILE NOT FOUND</h2>
        <p style="color: #aaa; font-size: 18px; margin-bottom: 40px; max-width: 500px; line-height: 1.6;">
            عذراً، يبدو أنك حاولت الوصول إلى مسار غير موجود في خوادمنا، أو أن الملف قد تم تشفيره.
        </p>
        <a href="index.html" class="btn-box" style="padding: 15px 40px; font-size: 20px;">
            <i class='bx bx-radar'></i> العودة إلى القاعدة الرئيسية
        </a>
    </div>
</body>

</html>
